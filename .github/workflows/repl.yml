name: Deploy REPL

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1-threads

      - name: Install dependencies
        run: pnpm install

      - name: Build WASM
        run: pnpm --filter typack run build-wasm

      - name: Copy WASM to REPL
        run: |
          mkdir -p repl/public/wasm
          cp napi/typack.wasm repl/public/wasm/

      - name: Build REPL
        run: pnpm --filter @typack/repl run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: repl/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
