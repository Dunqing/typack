name: Deploy REPL

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1-threads

      - name: Ensure WASM target is installed
        run: rustup target add wasm32-wasip1-threads

      - name: Install dependencies
        run: pnpm install

      - name: Build WASM
        run: pnpm --filter typack run build-wasm

      - name: Copy WASM to REPL
        run: |
          mkdir -p repl/public/wasm
          cp napi/typack.wasm repl/public/wasm/

      - name: Build REPL
        run: pnpm --filter @typack/repl run build

      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: repl
          command: pages deploy dist --project-name=typack --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.BRANCH_NAME.replace(/[/_.]/g, '-');
            const branchUrl = `https://${branch}.typack.pages.dev`;
            const body = [
              `🔗 **REPL Preview**`,
              `- **Branch:** ${branchUrl}`,
              `- **Commit:** ${process.env.DEPLOYMENT_URL}`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('REPL Preview:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          BRANCH_NAME: ${{ github.head_ref }}
